name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.22", "1.23"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go build ./...
      - run: go test -race -short -coverprofile=coverage.out -covermode=atomic ./...
      - run: go vet ./...
      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.23' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: gosec ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  fuzz:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Run fuzz tests (time-limited)
        run: |
          # Find all fuzz test functions and run each for 30s
          FUZZ_TARGETS=$(grep -r --include='*_test.go' -l 'func Fuzz' . || true)
          if [ -z "$FUZZ_TARGETS" ]; then
            echo "No fuzz targets found, skipping."
            exit 0
          fi
          for dir in $(echo "$FUZZ_TARGETS" | xargs -I{} dirname {} | sort -u); do
            for func in $(grep -h 'func Fuzz' "$dir"/*_test.go | sed 's/func \(Fuzz[a-zA-Z0-9_]*\).*/\1/'); do
              echo "Fuzzing $func in $dir for 30s..."
              go test "$dir" -fuzz="^${func}$" -fuzztime=30s || true
            done
          done

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Run benchmarks
        run: go test -bench=. -benchmem -short -run='^$' -count=1 ./... | tee benchmark-results.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 30

  benchmark-run:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        ref: [base, head]
        suite:
          - name: root
            path: .
          - name: detectors
            path: ./adapter/detector/...
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout base ref
        if: matrix.ref == 'base'
        run: git checkout ${{ github.event.pull_request.base.sha }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=3 -run='^$' -short ${{ matrix.suite.path }} > results.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.ref }}-${{ matrix.suite.name }}
          path: results.txt
          retention-days: 1

  benchmark-compare:
    runs-on: ubuntu-latest
    needs: benchmark-run
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bench-*
      - name: Compare benchmarks
        run: |
          echo "## Benchmark Comparison" > comment.md
          for suite in root detectors; do
            if [ -f "bench-base-${suite}/results.txt" ] && [ -f "bench-head-${suite}/results.txt" ]; then
              echo "" >> comment.md
              echo "### Suite: ${suite}" >> comment.md
              echo '```' >> comment.md
              benchstat "bench-base-${suite}/results.txt" "bench-head-${suite}/results.txt" >> comment.md 2>&1 || true
              echo '```' >> comment.md
            fi
          done
          cat comment.md
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8');
            if (body.trim()) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
